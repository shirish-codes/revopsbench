<!-- wp:html -->
<footer class="footer-dark" style="position:relative;overflow:hidden">

  <!-- Three.js 3-D wave canvas — sits at the top of the footer -->
  <div id="footer-wave-canvas" class="wave-canvas-wrap footer-wave-canvas"></div>

  <!-- Content sits above the wave -->
  <div style="position:relative;z-index:1">

    <div style="max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:2rem;padding:0 0 2rem">

      <!-- Brand -->
      <div>
        <div style="font-family:var(--font-heading);font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;background:var(--grad-teal);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem">The RevOps Bench</div>
        <div style="font-size:0.85rem;color:var(--text-muted);line-height:1.5">Powering the Modern B2B Engine.</div>
      </div>

      <!-- Links -->
      <div style="display:flex;gap:2rem;align-items:center;flex-wrap:wrap">
        <a href="/privacy-policy" style="font-size:0.82rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='rgba(255,255,255,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.38)'">Privacy Policy</a>
        <a href="/terms-of-service" style="font-size:0.82rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='rgba(255,255,255,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.38)'">Terms of Service</a>
        <a href="/contact" style="font-size:0.82rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='rgba(255,255,255,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.38)'">Contact Support</a>
      </div>

    </div>

    <div style="max-width:1200px;margin:0 auto;border-top:1px solid var(--border-subtle);padding-top:1.5rem">
      <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin:0">© 2026 The RevOps Bench. All rights reserved.</p>
    </div>

  </div>
</footer>
